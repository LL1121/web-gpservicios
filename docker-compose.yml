services:
  gpservicios-front:
    build:
      context: .
      dockerfile: Dockerfile
    image: lyntrix/gpservicios-front:latest
    container_name: gpservicios-front
    restart: unless-stopped

    ports:
      - "${FRONT_PORT:-3004}:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      # SMTP del formulario de contacto. Definí estos valores en el .env del
      # servidor. Si quedan vacíos, el form devuelve un error claro al usuario.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-comercial@gpservicios.com.ar}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}

    networks:
      - lyntrix_network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lyntrix_network:
    external: true


